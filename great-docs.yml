# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html
#
# Build with: python scripts/build_docs.py  (mirrors the site into the committed docs/ folder)

display_name: chameleon-flask
parser: google
dynamic: true
jupyter: python3

# Subpath hosting: drives Quarto's base path so CSS/JS/nav resolve. Keep trailing slash.
site_url: "https://mkennedy.codes/docs/chameleon-flask/"

# Sitemap/robots/canonical/og:url use a SEPARATE base URL that Great Docs auto-detects from the
# GitHub repo (-> mikeckennedy.github.io/chameleon-flask) and does NOT fall back to site_url.
# Set it explicitly or the sitemap points at the wrong domain.
seo:
  canonical:
    base_url: "https://mkennedy.codes/docs/chameleon-flask/"

repo: https://github.com/mikeckennedy/chameleon-flask
github_style: widget
source:
  enabled: true
  branch: main
  placement: usage
pypi: true

# Great Docs defaults mcp.enabled to true, rendering an empty "MCP" tab even when the
# project ships no MCP server. Keep this off.
mcp:
  enabled: false

# Umami analytics — merged into Quarto's format.html.include-in-header, so it lands in
# the <head> of every generated page.
include_in_header:
  - text: |
      <script async src="https://uma.mkennedy.codes/script.js" data-website-id="fc9b6770-3b44-4073-944e-4a4f0e79f66a"></script>

# Agent skill (SKILL.md + /.well-known/agent-skills/) is generated automatically; these
# enrich it with knowledge agents can't infer from the API signatures.
# See https://posit-dev.github.io/great-docs/skills.html
skill:
  gotchas:
    - "global_init() is one-shot by default: with cache_init=True, later calls are silently ignored. Pass cache_init=False or call chameleon_flask.engine.clear() to re-initialize."
    - "The bare @template form resolves the template file name once, at decoration time — call global_init() before defining views that rely on it."
    - "Decorated views must return a dict (the template model) or a Flask/Quart Response; any other return type raises FlaskChameleonException at request time."
    - "Chameleon's restricted namespace (the default) rejects Alpine.js/Vue shorthand attributes like @click, :class, and x-data. Pass restricted_namespace=False to global_init() to allow them."
    - "The 404 path from not_found() always renders with text/html and status 404; the view's own content_type and status_code do not apply."
    - "The decorator keyword is content_type, not mimetype (renamed in an earlier release)."
  best_practices:
    - "Call global_init(template_folder, auto_reload=dev_mode) exactly once at app startup, before any views are defined."
    - "Return plain dicts from views; return a Response only for redirects and other pass-through cases."
    - "Enable auto_reload only during development so templates stay cached in production."
    - "Use chameleon_flask.response() inside error handlers and other spots where the decorator doesn't fit."
  decision_table:
    - need: "Render a Chameleon template from a Flask/Quart view"
      use: "@chameleon_flask.template('home/index.pt') on the view function"
    - need: "Return a friendly 404 page from a view"
      use: "chameleon_flask.not_found()"
    - need: "Build a rendered Response outside a decorated view"
      use: "chameleon_flask.response(template_file, **model)"
    - need: "Get rendered HTML as a plain string"
      use: "chameleon_flask.engine.render(template_file, **model)"
    - need: "Use Alpine.js/Vue shorthand attributes in templates"
      use: "global_init(..., restricted_namespace=False)"

authors:
  - name: Michael Kennedy
    role: Author
    email: michael@talkpython.fm
    github: mikeckennedy

reference:
  title: "API Reference"
  desc: "The complete public API: engine setup, the @template decorator, direct rendering, and exceptions."
  sections:
    - title: Configuration
      desc: "Set up the Chameleon template engine once at app startup."
      contents:
        - global_init
        - engine.clear
    - title: Decorating views
      desc: "Render templates from Flask/Quart view functions (sync or async) and return friendly 404s."
      contents:
        - template
        - not_found
    - title: Direct rendering
      desc: "Render a template to a Response or raw HTML without the decorator."
      contents:
        - response
        - engine.render
    - title: Exceptions
      desc: "Errors raised by the engine. Importable from `chameleon_flask` directly or from `chameleon_flask.exceptions`."
      contents:
        - FlaskChameleonException
        - FlaskChameleonNotFoundException
